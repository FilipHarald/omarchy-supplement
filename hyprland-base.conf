# Hyprland base configuration
# Machine-specific monitor setup and keyboard defaults

# Monitor configuration with current resolutions
# Using descriptions for stable monitor identification
# Layout: LG HDR 4K (above) → laptop (below, centered)
monitor=desc:LG Electronics LG HDR 4K,3840x2160@60.00,0x0,1.50
monitor=eDP-1,1920x1200@59.95,640x1440,1.50

# Workspace assignments per monitor
# LG HDR 4K → workspaces 1-6
workspace=1,monitor:desc:LG Electronics LG HDR 4K,default:true
workspace=2,monitor:desc:LG Electronics LG HDR 4K,default:true
workspace=3,monitor:desc:LG Electronics LG HDR 4K,default:true
workspace=4,monitor:desc:LG Electronics LG HDR 4K,default:true
workspace=5,monitor:desc:LG Electronics LG HDR 4K,default:true
workspace=6,monitor:desc:LG Electronics LG HDR 4K,default:true

# eDP-1 (laptop) → workspaces 7-10, fallback for 1-6 when external monitor disconnected
workspace=7,monitor:eDP-1,default:true
workspace=8,monitor:eDP-1,default:true
workspace=9,monitor:eDP-1,default:true
workspace=10,monitor:eDP-1,default:true

# Keyboard configuration
# US International AltGr layout with Caps Lock as Escape
# Right Alt enables Swedish letters (åäö etc.) without dead keys
input {
  kb_layout = us
  kb_variant = altgr-intl
  kb_options = caps:escape
}

# Unbind conflicting keys before remapping
unbind = SUPER, J  # Was: Toggle window split (moved to SUPER+I)
unbind = SUPER, K  # Was: Show key bindings (moved to SUPER+U)

# Unbind default arrow key bindings (replaced with hjkl navigation below)
unbind = SUPER, LEFT
unbind = SUPER, RIGHT
unbind = SUPER, UP
unbind = SUPER, DOWN
unbind = SUPER SHIFT, LEFT
unbind = SUPER SHIFT, RIGHT
unbind = SUPER SHIFT, UP
unbind = SUPER SHIFT, DOWN
unbind = SUPER ALT, LEFT
unbind = SUPER ALT, RIGHT
unbind = SUPER ALT, UP
unbind = SUPER ALT, DOWN
unbind = SUPER CTRL, LEFT
unbind = SUPER CTRL, RIGHT
unbind = SUPER SHIFT ALT, LEFT
unbind = SUPER SHIFT ALT, RIGHT

# Vim-style navigation with hjkl (replaces default arrow key bindings)
# Move window focus with SUPER + hjkl
bindd = SUPER, h, Move window focus left, movefocus, l
bindd = SUPER, j, Move window focus down, movefocus, d
bindd = SUPER, k, Move window focus up, movefocus, u
bindd = SUPER, l, Move window focus right, movefocus, r

# Swap windows with SUPER + SHIFT + hjkl
bindd = SUPER SHIFT, h, Swap window to the left, swapwindow, l
bindd = SUPER SHIFT, j, Swap window down, swapwindow, d
bindd = SUPER SHIFT, k, Swap window up, swapwindow, u
bindd = SUPER SHIFT, l, Swap window to the right, swapwindow, r

# Move into groups with SUPER + ALT + hjkl
bindd = SUPER ALT, h, Move window to group on left, moveintogroup, l
bindd = SUPER ALT, j, Move window to group on bottom, moveintogroup, d
bindd = SUPER ALT, k, Move window to group on top, moveintogroup, u
bindd = SUPER ALT, l, Move window to group on right, moveintogroup, r

# Move focus within groups with SUPER + CTRL + hjkl
bindd = SUPER CTRL, h, Move grouped window focus left, changegroupactive, b
bindd = SUPER CTRL, l, Move grouped window focus right, changegroupactive, f

# Move workspace to monitor with SUPER + SHIFT + ALT + hjkl
bindd = SUPER SHIFT ALT, h, Move workspace to left monitor, movecurrentworkspacetomonitor, l
bindd = SUPER SHIFT ALT, l, Move workspace to right monitor, movecurrentworkspacetomonitor, r

# Remapped utilities (due to hjkl conflicts)
bindd = SUPER, U, Show key bindings, exec, omarchy-menu-keybindings
bindd = SUPER, I, Toggle window split, togglesplit

# Override lock screen binding (SUPER+CTRL+L → SUPER+CTRL+ESC)
unbind = SUPER CTRL, L
bindd = SUPER CTRL, ESCAPE, Lock system, exec, omarchy-lock-screen

# Disable window open/close animations
animation = windowsIn, 0
animation = windowsOut, 0
animation = windowsMove, 0
